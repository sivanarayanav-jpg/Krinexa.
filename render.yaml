# One-click deploy config for Render (https://render.com).
# In Render: New + → Blueprint → connect this repo → Apply.
# You get a public https://…onrender.com link that works on any phone, anywhere.
services:
  - type: web
    name: krinexa-agri
    runtime: node
    plan: free
    buildCommand: ""          # zero dependencies — nothing to build
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # --- Real SMS OTPs (optional): set these in the Render dashboard ---
      # Render → your service → Environment → Add Environment Variable.
      # Add SMS_PROVIDER = msg91, then MSG91_AUTHKEY and MSG91_TEMPLATE_ID.
      # (Leave them unset to keep demo OTPs shown on screen.)
      # - key: SMS_PROVIDER
      #   value: msg91
      # - key: MSG91_AUTHKEY
      #   sync: false        # set the secret value in the dashboard, not in git
      # - key: MSG91_TEMPLATE_ID
      #   sync: false
    # For a real pilot (so farmer data survives redeploys), upgrade to a paid
    # plan and add a persistent disk mounted at /opt/render/project/src :
    # disk:
    #   name: krinexa-data
    #   mountPath: /opt/render/project/src
    #   sizeGB: 1
