<head>

<title>Krinexa Agri</title>
<script src="chart.umd.min.js"></script>
<style>
  :root{--primary:#2E7D32;--pc:#B7F1B5;--onpc:#072100;--surface:#FBFDF7;--s1:#F1F5EC;--s2:#E9F0E3;--s3:#E2EBDB;--on:#1A1C19;--onv:#43483E;--outline:#73796E;--ov:#C3C8BC;--err:#BA1A1A;--errc:#FFDAD6;--warn:#F9A825;--info:#1565C0;--rs:8px;--rm:12px;--rl:16px;--sh1:0 1px 3px rgba(0,0,0,.16);--sh3:0 4px 12px rgba(0,0,0,.18);--fs:1}
  .large-font{--fs:1.18}
  .contrast{--on:#000;--onv:#000;--outline:#000;--surface:#fff;--s1:#fff;--ov:#000}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:'Segoe UI',Roboto,'Noto Sans Telugu',system-ui,sans-serif;background:#DCE5D8;color:var(--on);overflow-x:hidden}
  .te{font-family:'Noto Sans Telugu','Segoe UI',sans-serif}
  .topbar{position:sticky;top:0;z-index:60;background:#1A1C19;color:#fff;display:flex;gap:8px;align-items:center;padding:9px 14px;flex-wrap:wrap}
  .topbar b{font-size:14px}
  .seg{display:flex;background:#2c2f2b;border-radius:999px;padding:3px;gap:2px;flex-wrap:wrap}
  .seg button{border:0;background:transparent;color:#cfd4cb;padding:7px 12px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer}
  .seg button.on{background:var(--primary);color:#fff}
  .tgl{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .tbtn{border:0;background:#2c2f2b;color:#cfd4cb;border-radius:999px;padding:6px 11px;font-size:12px;cursor:pointer;display:flex;gap:5px;align-items:center}
  .tbtn.act{background:var(--primary);color:#fff}
  .onpill{font-weight:700}.onpill.off{color:#FFB4AB}
  .stage{display:flex;justify-content:center;padding:20px 12px 40px;min-height:100vh}
  .phone{width:392px;max-width:100%;height:802px;background:var(--surface);border-radius:36px;box-shadow:var(--sh3),0 0 0 11px #11130f,0 0 0 13px #2c2f2b;position:relative;overflow:hidden;display:flex;flex-direction:column}
  .sb{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:12px;font-weight:600;flex:0 0 auto}
  .sb .net{display:flex;gap:6px;align-items:center}
  .ofbar{font-size:12px;padding:7px 16px;display:flex;gap:8px;align-items:center;flex:0 0 auto}
  .ofbar.on{background:#E8F5E9;color:#1B5E20}.ofbar.off{background:#FFDAD6;color:#410002}
  .ab{display:flex;align-items:center;gap:10px;padding:10px 16px;flex:0 0 auto;background:var(--surface)}
  .ab .ti{font-size:calc(20px*var(--fs));font-weight:600}.ab .su{font-size:calc(12px*var(--fs));color:var(--onv)}
  .ib{width:42px;height:42px;border-radius:50%;border:0;background:transparent;cursor:pointer;display:grid;place-items:center;font-size:20px;color:var(--on);position:relative}
  .ib:hover{background:var(--s2)}

  .body{flex:1 1 auto;overflow-y:auto;padding:6px 16px 92px}.body::-webkit-scrollbar{width:0}
  .body.nn{padding-bottom:20px}
  .card{background:var(--s1);border:1px solid transparent;border-radius:var(--rl);padding:14px;margin:12px 0;box-shadow:var(--sh1)}
  .card.fl{box-shadow:none;border-color:var(--ov)}
  .st{font-size:calc(15px*var(--fs));font-weight:700;margin:16px 2px 4px}
  .grt{font-size:calc(21px*var(--fs));font-weight:600;margin:6px 0 2px}
  .idc{display:inline-block;background:#E8F5E9;color:#1B5E20;font-weight:700;font-size:12px;padding:3px 10px;border-radius:999px;letter-spacing:.5px}
  .crops{display:flex;gap:12px;overflow-x:auto;padding:4px 0;flex-wrap:wrap}.crops::-webkit-scrollbar{height:0}

  .adv{background:var(--surface);border:1px solid var(--ov);border-radius:var(--rl);overflow:hidden;margin:10px 0;cursor:pointer;box-shadow:var(--sh1)}

  .ostrip{display:flex;align-items:center;gap:12px;background:var(--s2);border-radius:var(--rl);padding:12px 14px;margin:12px 0;cursor:pointer}
  .fab{position:absolute;right:18px;bottom:82px;background:var(--primary);color:#fff;border:0;border-radius:var(--rl);padding:15px 19px;font-weight:700;font-size:calc(15px*var(--fs));display:flex;gap:9px;align-items:center;box-shadow:var(--sh3);cursor:pointer;z-index:5}
  .bn{position:absolute;bottom:0;left:0;right:0;height:74px;background:var(--s2);display:flex;justify-content:space-around;align-items:center;padding-bottom:8px;flex:0 0 auto;z-index:4}

  .btn{width:100%;background:var(--primary);color:#fff;border:0;border-radius:999px;padding:15px;font-size:calc(16px*var(--fs));font-weight:700;cursor:pointer;margin-top:10px}
  .btn:active{transform:scale(.99)}.btn.tonal{background:var(--pc);color:var(--onpc)}.btn.out{background:transparent;color:var(--primary);border:1.5px solid var(--outline)}.btn.gh{background:transparent;color:var(--onv);border:0}.btn.dl{background:var(--err)}
  .fld{margin:13px 0}.fld label{font-size:calc(13px*var(--fs));color:var(--onv);font-weight:600;display:block;margin-bottom:6px}
  .opt-t{font-size:11px;color:var(--outline);font-weight:500}
  .inp{display:flex;align-items:center;gap:8px;border:1.5px solid var(--outline);border-radius:var(--rs);padding:13px;font-size:16px;background:var(--surface)}

  .chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .chip{padding:8px 13px;border-radius:999px;border:1.5px solid var(--outline);font-size:13px;cursor:pointer;background:var(--surface)}
  .chip.on{background:var(--pc);border-color:transparent;color:var(--onpc);font-weight:700}
  .tg2{display:flex;gap:10px;margin-top:6px}.tg2 .o{flex:1;border:2px solid var(--ov);border-radius:var(--rm);padding:15px 10px;text-align:center;font-weight:600;cursor:pointer}.tg2 .o.on{border-color:var(--primary);background:var(--pc);color:var(--onpc)}.tg2 .o .ic{font-size:25px;display:block;margin-bottom:3px}
  .steps{display:flex;gap:6px;padding:10px 16px 4px}.steps .d{flex:1;height:5px;border-radius:3px;background:var(--ov)}.steps .d.on{background:var(--primary)}
  .mgr{background:#EEF6FF;border:1px solid #BBDEFB;border-radius:var(--rm);padding:12px;margin:12px 0}.mgr b{font-size:13px;color:#0D47A1}.mgr .r{font-size:12px;color:#1565C0;margin-top:4px}
  .mic{width:116px;height:116px;border-radius:50%;background:var(--primary);color:#fff;border:0;font-size:42px;display:grid;place-items:center;margin:18px auto;cursor:pointer;box-shadow:var(--sh3)}
  .mic.rec{animation:pl 1.3s infinite}@keyframes pl{0%{box-shadow:0 0 0 0 rgba(46,125,50,.5)}70%{box-shadow:0 0 0 22px rgba(46,125,50,0)}100%{box-shadow:0 0 0 0 rgba(46,125,50,0)}}
  .wave{height:30px;display:flex;gap:3px;align-items:center;justify-content:center}.wave span{width:4px;background:var(--primary);border-radius:2px;animation:w 1s infinite}@keyframes w{0%,100%{height:8px}50%{height:26px}}
  .pt{width:60px;height:60px;border-radius:var(--rs);background:linear-gradient(135deg,#a5d6a7,#66bb6a);display:grid;place-items:center;font-size:24px}
  .vbar{display:flex;gap:8px;align-items:center;background:#E8F5E9;border-radius:999px;padding:8px 12px;margin:10px 0}
  .vbar button{border:0;background:var(--primary);color:#fff;border-radius:999px;padding:8px 14px;font-weight:600;font-size:13px;cursor:pointer;display:flex;gap:6px;align-items:center}
  .vbar .vb2{background:#fff;color:var(--primary);border:1px solid var(--primary)}
  .vbar .prog{flex:1;height:6px;background:#C8E6C9;border-radius:3px;overflow:hidden}.vbar .prog i{display:block;height:100%;width:0;background:var(--primary);transition:width .2s linear}
  .tl{display:flex;gap:14px}.tl .col{display:flex;flex-direction:column;align-items:center}
  .tl .nd{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:13px;background:var(--s3);color:var(--outline);border:2px solid var(--ov)}
  .tl.dn .nd{background:var(--primary);color:#fff;border-color:var(--primary)}.tl.cu .nd{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 0 4px var(--pc)}
  .tl .ln{flex:1;width:3px;background:var(--ov);margin:2px 0}.tl.dn .ln{background:var(--primary)}
  .tl .inf{padding-bottom:18px}.tl .inf b{font-size:calc(15px*var(--fs))}.tl .inf span{display:block;font-size:12px;color:var(--onv);margin-top:2px}
  .prod{display:flex;gap:12px;align-items:center;border:1px solid var(--ov);border-radius:var(--rm);padding:12px;margin:10px 0;cursor:pointer}
  .prod .pi{width:52px;height:52px;border-radius:var(--rs);background:#E8F5E9;display:grid;place-items:center;font-size:26px}
  .prod .pn{flex:1}.prod .pn b{font-size:calc(15px*var(--fs))}.prod .pn .pr{color:var(--primary);font-weight:700}
  .addb{background:var(--primary);color:#fff;border:0;border-radius:999px;padding:9px 14px;font-weight:700;cursor:pointer;font-size:13px}
  .sbad{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700}.sb-ok{background:#E8F5E9;color:#1B5E20}.sb-no{background:#FFEBEE;color:#B71C1C}
  .alert{display:flex;gap:10px;align-items:flex-start;padding:12px;border-radius:var(--rm);margin:12px 0;font-size:calc(13px*var(--fs));line-height:1.5}
  .al-w{background:var(--errc);color:#410002}.al-i{background:#E3F2FD;color:#0D47A1}.al-ok{background:#E8F5E9;color:#1B5E20}
  .pd{border-top:1px solid var(--ov);padding:11px 0}.pd b{font-size:13px;display:flex;gap:7px;align-items:center}.pd p{margin:4px 0 0;font-size:calc(13px*var(--fs));color:var(--onv);line-height:1.5}
  .nt{display:flex;gap:12px;padding:12px;border-bottom:1px solid var(--ov);align-items:flex-start;cursor:pointer}
  .nt .ni2{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:20px;flex:0 0 auto}
  .nt .nb b{font-size:14px}.nt .nb p{margin:3px 0 0;font-size:12px;color:var(--onv)}.nt .tm{font-size:11px;color:var(--outline);margin-left:auto}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
  .kpi{background:var(--s1);border-radius:var(--rl);padding:14px;box-shadow:var(--sh1);cursor:pointer}.kpi .n{font-size:calc(23px*var(--fs));font-weight:800;color:var(--primary)}.kpi .l{font-size:12px;color:var(--onv)}
  .es{text-align:center;padding:46px 24px;color:var(--onv)}.es .ic{font-size:54px;opacity:.5}.es h4{margin:14px 0 4px;font-size:calc(17px*var(--fs));color:var(--on)}.es p{margin:0;font-size:13px}
  .sk{background:linear-gradient(90deg,#e8ece4 25%,#f3f6ef 37%,#e8ece4 63%);background-size:400% 100%;animation:shim 1.3s infinite;border-radius:8px}
  @keyframes shim{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .skrow{display:flex;gap:12px;align-items:center;margin:12px 0}.skrow .a{width:52px;height:52px;border-radius:10px}.skrow .b{flex:1}.skrow .b .l1{height:14px;margin-bottom:8px}.skrow .b .l2{height:11px;width:60%}
  .dash{width:min(1200px,100%);background:var(--surface);border-radius:20px;box-shadow:var(--sh3);overflow:hidden;display:flex}
  .side{width:236px;background:#1A1C19;color:#cfd4cb;padding:16px 0;flex:0 0 auto;overflow-y:auto;max-height:802px}
  .side .br{padding:0 20px 8px;font-weight:800;font-size:17px;color:#fff}
  .side .cx{padding:0 20px 12px;font-size:11px;color:#8a8f86;border-bottom:1px solid #2c2f2b;margin-bottom:8px}
  .side a{display:flex;gap:11px;align-items:center;padding:11px 20px;font-size:13.5px;cursor:pointer;color:#cfd4cb}
  .side a.on{background:var(--primary);color:#fff;font-weight:700}.side a:hover:not(.on){background:#2c2f2b}
  .side .gl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#6f746b;padding:12px 20px 4px}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;max-height:802px}
  .tp{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--ov)}.tp h2{margin:0;font-size:calc(19px*var(--fs))}.tp .gw{flex:1}
  .av{width:36px;height:36px;border-radius:50%;background:var(--pc);color:var(--onpc);display:grid;place-items:center;font-weight:700}
  .ct2{padding:20px 24px;overflow-y:auto}
  .dk{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .dc{border-radius:var(--rl);padding:16px;color:#fff;cursor:pointer;transition:.15s}.dc:hover{transform:translateY(-2px)}.dc .n{font-size:calc(26px*var(--fs));font-weight:800}.dc .l{font-size:12.5px;opacity:.95}
  .g{background:#2E7D32}.a{background:#F9A825;color:#3a2c00}.r{background:#C62828}.k{background:#37474F}.b{background:#1565C0}.p{background:#6A1B9A}.t{background:#00695C}
  .g2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}.g2.ev{grid-template-columns:1fr 1fr}
  .pan{border:1px solid var(--ov);border-radius:var(--rl);padding:16px;background:var(--surface);margin-bottom:16px}.pan h3{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:8px}.pan h3 .gw{flex:1}
  table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--ov)}th{color:var(--onv);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
  tr.clk{cursor:pointer}tr.clk:hover{background:var(--s2)}
  .stt{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-block}
  .s-ok{background:#E8F5E9;color:#1B5E20}.s-w{background:#FFF8E1;color:#7A5800}.s-bd{background:#FFEBEE;color:#B71C1C}.s-i{background:#E3F2FD;color:#0D47A1}.s-p{background:#F3E5F5;color:#4A148C}.s-m{background:#ECEFF1;color:#37474F}
  .mf{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .db{border:0;border-radius:999px;padding:7px 13px;font-weight:700;font-size:12.5px;cursor:pointer}.db.pri{background:var(--primary);color:#fff}.db.ok{background:#E8F5E9;color:#1B5E20}.db.no{background:#FFEBEE;color:#B71C1C}.db.ed{background:#E3F2FD;color:#0D47A1}.db.tr{background:#FFF3E0;color:#E65100}
  .fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fg .f label{font-size:12px;color:var(--onv);font-weight:600;display:block;margin-bottom:5px}.fg .f input,.fg .f select{width:100%;padding:10px;border:1.5px solid var(--ov);border-radius:var(--rs);font-family:inherit;font-size:13px}
  .srch{display:flex;align-items:center;gap:8px;border:1.5px solid var(--ov);border-radius:999px;padding:9px 14px;margin-bottom:14px;background:var(--surface)}.srch input{border:0;outline:0;flex:1;font-size:14px;font-family:inherit;background:transparent}
  @media(max-width:760px){.side{display:none}.dk{grid-template-columns:1fr 1fr}.g2,.g2.ev,.fg{grid-template-columns:1fr}}
  .hide{display:none!important}.fade{animation:f .25s ease}@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:grid;place-items:center;z-index:200}.modal .bx{background:#fff;border-radius:16px;padding:22px;width:min(620px,92%);max-height:88vh;overflow-y:auto}
  .toast{position:fixed;left:50%;bottom:34px;transform:translate(-50%,20px);background:#1A1C19;color:#fff;padding:14px 20px;border-radius:14px;font-size:14px;box-shadow:var(--sh3);z-index:300;opacity:0;transition:.3s;max-width:86%;text-align:center;line-height:1.5}.toast.show{opacity:1;transform:translate(-50%,0)}

  .lang-card.on{border-color:var(--primary);background:var(--pc)}
  .slogan{font-size:12px;color:var(--onv);letter-spacing:.4px;margin-top:2px}
  .mandal-grp{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--onv);font-weight:800;margin:16px 2px 6px;display:flex;align-items:center;gap:6px}

  .consent-box input{margin-top:3px}
  .matrix{width:100%;border-collapse:collapse;font-size:12px}.matrix th,.matrix td{border:1px solid var(--ov);padding:8px;text-align:center}
  .rankdot{width:10px;height:10px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
<div class="topbar">
  <b><span id="logoSpan">🌱</span> Krinexa Agri</b>
  <div class="seg" id="appseg">
    <button class="on" onclick="setApp('farmer',this)">👨‍🌾 Farmer</button>
    <button onclick="setApp('field',this)">🧑‍💼 Field Staff</button>
    <button onclick="setApp('agronomist',this)">🌾 Agronomist</button>
    <button onclick="setApp('fpo',this)">🏢 FPO Portal</button>
    <button onclick="setApp('admin',this)">🛠️ Admin</button>
  </div>
  <div class="tgl">
    <button class="tbtn" id="netBtn" onclick="toggleNet()"><span class="onpill" id="netLbl">🟢 Online</span></button>
    <button class="tbtn" id="lfBtn" onclick="toggleA('large','lfBtn')">A+</button>
    <button class="tbtn" id="ctBtn" onclick="toggleA('contrast','ctBtn')">◐</button>
  </div>
</div>
<div class="stage" id="stage"></div>
<div id="modalRoot"></div><div id="toastRoot"></div>

<script>
/* ===== MOCK DATA ===== */
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a, pick=a=>a[rnd(0,a.length-1)];
const teNames=['రాములు','లక్ష్మి','వెంకటేశ్','సీతమ్మ','రాజేష్','అనిత','సురేష్','దివ్య','కిరణ్','పద్మ','నారాయణ','గీత','రవి','సరిత','మోహన్','కవిత','శ్రీను','భారతి','ప్రసాద్','రమ'];

input value="ఆకులపై పిచికారీ"></div><div class="f"><label>Safety</label><input value="మాస్క్ ధరించండి"></div><div class="f" style="grid-column:1/3"><label>Additional Remarks <span style="font-weight:400;color:var(--onv)">(optional · visible to Farmer & Field Staff)</span></label><input id="remarksInp" value="${a.remarks||''}" placeholder="ఏవైనా అదనపు వ్యాఖ్యలు..."></div><div class="f"><label>Follow-up Date</label><input type="date"></div></div><button class="db pri" style="margin-top:14px;width:100%" onclick="a.remarks=$('remarksInp').value;S.lastRemarks=a.remarks;toast('✅ Recommendation Provided · Farmer & Field Staff notified');go('queue',null,true)">Provide Recommendation → Notify Farmer</button></div></div></div>`;}

function feedbackForm(type){const types=[['advisory','సలహా (Advisory)'],['product','ఉత్పత్తి (Product)'],['delivery','డెలివరీ (Delivery)'],['fieldstaff','ఫీల్డ్ స్టాఫ్ (Support)'],['fpo','FPO/FPC']];$('modalRoot').innerHTML=`<div class="modal"><div class="bx" style="max-width:420px"><h3 style="margin:0 0 12px" class="te">అభిప్రాయం ఇవ్వండి · Feedback</h3><div class="fld"><label class="te">వర్గం</label><div class="inp"><select id="fbType" class="te">${types.map(t=>`<option value="${t[0]}" ${t[0]===type?'selected':''}>${t[1]}</option>`).join('')}</select></div></div><div class="fld"><label class="te">రేటింగ్ (1–5)</label><div id="fbStars" style="font-size:32px;cursor:pointer;letter-spacing:4px">${[1,2,3,4,5].map(n=>`<span onclick="setStars(${n})" data-n="${n}">☆</span>`).join('')}</div></div><div class="fld"><label class="te">ఇది ఉపయోగపడిందా?</label><div class="chiprow"><div class="chip on te" onclick="selC(this)">అవును 👍</div><div class="chip te" onclick="selC(this)">లేదు 👎</div></div></div><div class="fld"><label class="te">వ్యాఖ్యలు</label><div class="inp" style="align-items:flex-start"><textarea class="te" rows="2" style="border:0;outline:0;width:100%;font-family:inherit;font-size:15px;resize:none" placeholder="మీ అభిప్రాయం..."></textarea></div></div><div style="display:flex;gap:10px"><button class="btn te" style="margin-top:0" onclick="closeModal();toast('🙏 మీ అభిప్రాయానికి ధన్యవాదాలు')">సమర్పించండి</button><button class="db no" onclick="closeModal()">Cancel</button></div></div></div>`;}
function setStars(n){document.querySelectorAll('#fbStars span').forEach(s=>{const on=+s.dataset.n<=n;s.textContent=on?'★':'☆';s.style.color=on?'#F9A825':'';});}
function feedbackAnalytics(){const bar=(l,v,c)=>`<div style="margin:9px 0"><div style="display:flex;justify-content:space-between;font-size:13px"><span>${l}</span><b>${v} / 5</b></div><div style="height:9px;background:#eee;border-radius:5px;overflow:hidden;margin-top:3px"><i style="display:block;height:100%;width:${v/5*100}%;background:${c}"></i></div></div>`;$('modalRoot').innerHTML=`<div class="modal"><div class="bx" style="max-width:460px"><h3 style="margin:0 0 14px">📊 Feedback & Satisfaction Analytics</h3>${bar('Product Ratings',4.3,'#2E7D32')}${bar('Advisory Ratings',4.6,'#1565C0')}${bar('Delivery Ratings',4.1,'#F9A825')}${bar('Employee / Field Staff',4.4,'#6A1B9A')}${bar('FPO/FPC Satisfaction',4.2,'#00695C')}<button class="db pri" style="margin-top:10px" onclick="closeModal()">Close</button></div></div>`;}

function admProdSearch(q){const t=$('apTbl');if(!t)return;const f=PRODUCTS.filter(p=>p.name.includes(q)||p.cat.toLowerCase().includes(q.toLowerCase())).slice(0,12);t.innerHTML=f.length?dataTable(['Photo','Name (TE/EN)','Category','SKU','Price','Stock','Status',''],f.map(p=>`<tr><td>${p.photo?'📷':p.e}</td><td class="te">${p.name} (${p.nameEn})</td><td>${p.cat}</td><td>${p.id}</td><td>₹${p.price}</td><td>${p.stk}</td><td><span class="stt ${p.stk>50?'s-ok':p.stk>0?'s-w':'s-bd'}">${p.stk>50?'In':p.stk>0?'Low':'Out'}</span></td><td></td></tr>`).join('')):empty('🔍','No products found','',null);}
function admFarmerFilter(){
  const dist=$('fmDist').value,mandal=$('fmMandal').value,village=$('fmVillage').value,type=$('fmType').value;
  let list=FARMERS.filter(x=>{
    if(dist&&x.dist!==dist)return false;
    if(village&&x.village!==village)return false;
    if(mandal&&mandalOf(x.village)!==mandal)return false;
    if(type==='Individual'&&x.fpo!=='Individual')return false;
    if(type==='FPO'&&x.fpo==='Individual')return false;
    if(type&&type!=='FPO'&&type!=='Individual'&&x.fpo!==type)return false;
    return true;
  });
  const t=$('fmTbl');
  t.innerHTML=list.length?dataTable(['Farmer','ID','Village','District','FPO/Individual','Crop'],list.slice(0,30).map(x=>`<tr><td class="te">${x.name}</td><td style="color:#1B5E20;font-weight:700">${x.id}</td><td>${x.village}</td><td>${x.dist}</td><td class="te">${x.fpo}</td><td class="te">${x.crop[1]}</td></tr>`).join('')):empty('🔍','No farmers match these filters','',null);
  toast('✅ Filters applied · '+list.length+' farmers found');
}

<!-- ===== BACKEND SYNC LAYER: shared data across all devices (server.js) ===== -->
<script>
(function(){
  if(!location.origin.startsWith('http'))return; /* opened as file:// → offline/local-only mode */
  try{window.KRX_AUTH=JSON.parse(localStorage.getItem('krx_auth')||'null');}catch(e){window.KRX_AUTH=null;}
  const rawJ=(m,u,b)=>fetch(u,{method:m,headers:Object.assign({'Content-Type':'application/json'},window.KRX_AUTH&&window.KRX_AUTH.token?{'x-auth':window.KRX_AUTH.token}:{}),body:b?JSON.stringify(b):undefined}).then(r=>r.json());
  /* offline outbox: failed writes are queued and re-sent automatically when the connection returns */
  const QKEY='krx_outbox';
  let outbox=[];try{outbox=JSON.parse(localStorage.getItem(QKEY)||'[]');}catch(e){}
  const saveQ=()=>{try{localStorage.setItem(QKEY,JSON.stringify(outbox));}catch(e){}};
  const j=(m,u,b)=>rawJ(m,u,b).catch(()=>{
    if(m!=='GET'&&u.indexOf('/api/auth/')!==0){outbox.push({m:m,u:u,b:b});saveQ();toast('📡 ఆఫ్‌లైన్ — కనెక్షన్ రాగానే స్వయంచాలకంగా పంపబడుతుంది');}
    return null;
  });
  async function flushQ(){
    if(!outbox.length)return;
    while(outbox.length){
      try{await rawJ(outbox[0].m,outbox[0].u,outbox[0].b);}catch(e){return;}
      outbox.shift();saveQ();
    }
    toast('✅ ఆఫ్‌లైన్ డేటా సర్వర్‌కు పంపబడింది');
  }
  setInterval(flushQ,15000);
  window.addEventListener('online',flushQ);
  setTimeout(flushQ,2000);
  window.krxJ=j;

  /* --- Pull shared data from the server into every role's views --- */
  function applyDb(db){
    if(!db)return false;
    let changed=false;
    (db.farmers||[]).forEach(f=>{if(f.id&&!FARMERS.some(x=>x.id===f.id)){FARMERS.unshift(f);changed=true;}});
    (db.orders||[]).forEach(o=>{const ex=o.id&&ORDERS.find(x=>x.id===o.id);if(ex){['status','payStatus'].forEach(k=>{if(o[k]!==undefined&&ex[k]!==o[k]){ex[k]=o[k];changed=true;}});}else if(o.id){ORDERS.unshift(o);changed=true;}});
    (db.tickets||[]).forEach(t=>{const ex=t.id&&ADV.find(x=>x.id===t.id);if(ex){['status','remarks','outcome'].forEach(k=>{if(t[k]!==undefined&&ex[k]!==t[k]){ex[k]=t[k];changed=true;}});}else if(t.id){ADV.unshift(t);changed=true;}});
    (db.consents||[]).forEach(c=>{if(!CONSENTS.some(x=>x.farmer===c.farmer&&x.date===c.date)){CONSENTS.push(c);changed=true;}});
    (db.products||[]).forEach(p=>{const ex=PRODUCTS.find(x=>x.id===p.id);if(ex){if(ex.stk!==p.stk){ex.stk=p.stk;changed=true;}}else{PRODUCTS.unshift(p);changed=true;}});
    if(db.config){
      if(db.config.deliveryTiers&&db.config.deliveryTiers.length)DELIVERY_TIERS=db.config.deliveryTiers;
      if(db.config.logo){APP_LOGO=db.config.logo;const ls=document.getElementById('logoSpan');if(ls)ls.innerHTML=APP_LOGO;}
    }
    return changed;
  }
  /* self-healing: if the server ever loses this farmer's data (e.g. free-tier
     hosting reset), the phone re-registers its own profile and orders */
  let healAt=0;
  function selfHeal(db){
    if(!farmerProfile||!db||!db.farmers)return;
    if(db.farmers.some(f=>f.id===farmerProfile.fid))return;
    if(Date.now()-healAt<60000)return;
    healAt=Date.now();
    j('POST','/api/farmers',{id:farmerProfile.fid,name:farmerProfile.name,mobile:farmerProfile.mobile,email:farmerProfile.email||'',village:farmerProfile.village,mandal:farmerProfile.mandal,dist:farmerProfile.dist,pin:farmerProfile.pin,crop:[farmerProfile.cropIcon||'🌱',farmerProfile.crop],fpo:farmerProfile.fpo,acres:farmerProfile.acres,orders:0,adv:0,approved:true}).then(r=>{
      if(r&&r.token){window.KRX_AUTH={token:r.token,role:'farmer'};try{localStorage.setItem('krx_auth',JSON.stringify(window.KRX_AUTH));}catch(e){}}
      if(r&&(r.ok||r.dup))toast('🔄 మీ ఖాతా సర్వర్‌కు తిరిగి సమకాలీకరించబడింది');
    });
    myOrders.forEach(o=>{if(!db.orders.some(x=>x.id===o.id))j('POST','/api/orders',{id:o.id,farmer:farmerProfile.name,village:farmerProfile.village,items:o.items,amt:'₹'+o.amt,status:o.status,ftype:farmerProfile.fpo==='Individual'?'Individual':'FPO',product:o.product,payStatus:o.payStatus,lineItems:o.lineItems||[]});});
  }
  j('GET','/api/db').then(db=>{if(db){applyDb(db);selfHeal(db);render();}});

  /* --- Live updates: poll every 25s, refresh only when it will not disturb the user --- */
  setInterval(()=>{j('GET','/api/db').then(db=>{
    if(!db)return;
    const changed=applyDb(db);
    selfHeal(db);
    const typing=document.activeElement&&['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
    const modalOpen=document.querySelector('#modalRoot .modal');
    if(changed&&!typing&&!modalOpen)render();
  });},25000);

  /* --- Push local actions to the server --- */
  const _finishSignup=finishSignup;
  finishSignup=function(){
    _finishSignup();
    if(farmerProfile)j('POST','/api/farmers',{id:farmerProfile.fid,name:farmerProfile.name,mobile:farmerProfile.mobile,email:farmerProfile.email||'',village:farmerProfile.village,mandal:farmerProfile.mandal,dist:farmerProfile.dist,pin:farmerProfile.pin,crop:[farmerProfile.cropIcon||'🌱',farmerProfile.crop],fpo:farmerProfile.fpo,acres:farmerProfile.acres,orders:0,adv:0,approved:true}).then(r=>{
      if(r&&r.token){window.KRX_AUTH={token:r.token,role:'farmer'};try{localStorage.setItem('krx_auth',JSON.stringify(window.KRX_AUTH));}catch(e){}}
      else if(r&&r.error==='mobile_exists'){farmerProfile=null;try{localStorage.removeItem('krinexa_state_v1');}catch(e){}toast('⚠️ ఈ మొబైల్ నంబర్ ఇప్పటికే నమోదైంది — దయచేసి లాగిన్ చేయండి');setTimeout(()=>{S.app='farmer';go('login');},1800);}
      else if(r&&r.error==='bad_mobile'){toast('⚠️ సరైన 10-అంకెల మొబైల్ నంబర్ ఇవ్వండి');}
    });
  };

  const _placeOrder=placeOrder;
  placeOrder=function(tot){const qty=cart.length,prod=PRODUCTS[0];_placeOrder(tot);if(ORDERS.length){ORDERS[0].qty=qty;ORDERS[0].productId=prod?prod.id:'';j('POST','/api/orders',ORDERS[0]);}};

  let lastTicketArea=null;
  const _go2=go;
  go=function(screen,params,isData){
    _go2(screen,params,isData);
    if(screen==='ticket'&&S.lastPlotArea&&S.lastPlotArea!==lastTicketArea){
      lastTicketArea=S.lastPlotArea;
      const t={id:'#AD-'+(2300+ADV.length),farmer:farmerProfile?farmerProfile.name:'రాములు రెడ్డి',crop:farmerProfile?farmerProfile.crop:'మిర్చి',status:'Open',sla:'24 గం',plotArea:S.lastPlotArea,remarks:'',photos:(window.__krxPhotos||[]).slice(0,3)};
      ADV.unshift(t);
      j('POST','/api/tickets',t);
      window.__krxPhotos=[];
    }
  };

  const _logConsent=logConsent;
  logConsent=function(n){_logConsent(n);if(CONSENTS.length)j('POST','/api/consents',CONSENTS[CONSENTS.length-1]);};

  const pushConfig=()=>j('PUT','/api/config',{deliveryTiers:DELIVERY_TIERS,logo:APP_LOGO});
  const _saveDeliveryTiers=saveDeliveryTiers;
  saveDeliveryTiers=function(){_saveDeliveryTiers();pushConfig();};
  const _setLogo2=setLogo;
  setLogo=function(v){_setLogo2(v);pushConfig();};

  const _confirmOutcome=confirmOutcome;
  confirmOutcome=function(i){const a=ADV[i];_confirmOutcome(i);if(a&&a.id)j('PATCH','/api/tickets/'+encodeURIComponent(a.id),{status:a.status,outcome:a.outcome||''});};

  const _confirmOnlinePayment=confirmOnlinePayment;
  confirmOnlinePayment=function(oi){const o=ORDERS[oi];_confirmOnlinePayment(oi);if(o&&o.id)j('PATCH','/api/orders/'+encodeURIComponent(o.id),{payStatus:'Paid'});};

  /* Admin adds a product → it appears in every farmer's shop */
  const _saveNewProduct=saveNewProduct;
  saveNewProduct=function(){const before=PRODUCTS.length;_saveNewProduct();if(PRODUCTS.length>before)j('POST','/api/products',PRODUCTS[0]);};
})();
</script>

<!-- ===== AUTH LAYER: real logins — OTP for farmers, password for staff (server.js) ===== -->
<script>
(function(){
  if(!location.origin.startsWith('http'))return;
  const j=window.krxJ;
  function setAuth(a){window.KRX_AUTH=a;try{a?localStorage.setItem('krx_auth',JSON.stringify(a)):localStorage.removeItem('krx_auth');}catch(e){}}
  function clearAuth(){if(window.KRX_AUTH)j('POST','/api/auth/logout');setAuth(null);}

  /* --- Change Password (all staff roles) --- */
  window.changePasswordForm=function(){
    if(!window.KRX_AUTH||window.KRX_AUTH.role==='farmer'){toast('⚠️ Staff login required');return;}
    $('modalRoot').innerHTML=`<div class="modal"><div class="bx" style="max-width:400px"><h3 style="margin:0 0 12px">🔑 Change Password</h3>
      <div class="fld"><label>Current password</label><div class="inp"><span>🔒</span><input id="cpOld" type="password"></div></div>
      <div class="fld"><label>New password (min 8 characters)</label><div class="inp"><span>🔑</span><input id="cpNew" type="password"></div></div>
      <div class="fld"><label>Confirm new password</label><div class="inp"><span>🔑</span><input id="cpNew2" type="password"></div></div>
      <div style="display:flex;gap:10px"><button class="btn" style="margin-top:0" onclick="submitPasswordChange()">Save</button><button class="db no" onclick="closeModal()">Cancel</button></div></div></div>`;
  };
  window.submitPasswordChange=async function(){
    const o=$('cpOld').value,n=$('cpNew').value,n2=$('cpNew2').value;
    if(n!==n2){toast('❌ New passwords do not match');return;}
    if(n.length<8){toast('❌ Password must be at least 8 characters');return;}
    const r=await j('POST','/api/auth/change-password',{oldPassword:o,newPassword:n});
    if(r&&r.ok){closeModal();toast('✅ Password changed — use it from your next login');}
    else toast(r&&r.error==='wrong_password'?'❌ Current password is wrong':'❌ Could not change password');
  };
  const _dashShell4=dashShell;
  dashShell=function(nav,active,ctx,fn,content){
    return _dashShell4(nav,active,ctx,fn,content)
      .replace('<div class="gl">Session</div>','<div class="gl">Session</div><a onclick="changePasswordForm()"><span>🔑</span><span>Change Password</span></a>')
      .replace('<div class="mnav">','<div class="mnav"><button onclick="changePasswordForm()">🔑 Password</button>');
  };

  /* farmers stay logged in on their device */
  if(window.KRX_AUTH&&window.KRX_AUTH.role==='farmer'&&S.app==='farmer'&&farmerProfile&&(S.screen==='lang'||S.screen==='welcome'))S.screen='home';

  /* logging out ends the session */
  const _go3=go;
  go=function(screen,params,isData){if(screen==='welcome'&&S.screen==='profile'&&window.KRX_AUTH&&window.KRX_AUTH.role==='farmer')clearAuth();_go3(screen,params,isData);};
  const _setApp3=setApp;
  setApp=function(app,btn){if(window.KRX_AUTH&&window.KRX_AUTH.role!=='farmer')clearAuth();_setApp3(app,btn);};

  function enhance(){
    /* --- Farmer: real OTP login --- */
    if(S.app==='farmer'&&S.screen==='login'){
      const body=document.querySelector('.phone .body');
      if(!body||body.dataset.krxAuth)return;
      body.dataset.krxAuth='1';
      const inputs=body.querySelectorAll('.inp input');
      const mobileInp=inputs[0],otpInp=inputs[1];
      const send=document.createElement('button');
      send.className='btn tonal te';send.textContent='📲 OTP పంపండి (Send OTP)';
      mobileInp.closest('.fld').after(send);
      send.onclick=async()=>{
        const r=await j('POST','/api/auth/otp',{mobile:mobileInp.value});
        if(r===null){toast('సర్వర్ అందుబాటులో లేదు — డెమో మోడ్');return;}
        if(!r.ok){toast(r.error==='not_registered'?'⚠️ ఈ నంబర్ నమోదు కాలేదు — ముందుగా నమోదు చేసుకోండి':'⚠️ సరైన మొబైల్ నంబర్ ఇవ్వండి');return;}
        toast('✅ OTP పంపబడింది'+(r.demo_otp?'\n(డెమో OTP: '+r.demo_otp+')':''));
      };
      const loginBtn=[...body.querySelectorAll('button')].find(b=>b.textContent.trim().startsWith('లాగిన్'));
      if(loginBtn)loginBtn.onclick=async()=>{
        const r=await j('POST','/api/auth/verify',{mobile:mobileInp.value,otp:otpInp.value});
        if(r===null){go('home');return;}
        if(!r.ok){toast('❌ OTP తప్పు లేదా గడువు ముగిసింది');return;}
        setAuth({token:r.token,role:'farmer'});
        if(r.farmer)farmerProfile={fid:r.farmer.id,name:r.farmer.name,mobile:r.farmer.mobile,email:r.farmer.email||'',state:'తెలంగాణ',dist:r.farmer.dist,mandal:r.farmer.mandal,village:r.farmer.village,pin:r.farmer.pin,fpo:r.farmer.fpo,crop:Array.isArray(r.farmer.crop)?r.farmer.crop[1]:r.farmer.crop,cropIcon:Array.isArray(r.farmer.crop)?r.farmer.crop[0]:'🌱',acres:r.farmer.acres};
        toast('✅ స్వాగతం, '+(farmerProfile?farmerProfile.name:'')+' గారు');
        go('home');
      };
    }
    /* --- Field staff: real password login --- */
    if(S.app==='field'&&S.screen==='login'){
      const body=document.querySelector('.phone .body');
      if(!body||body.dataset.krxAuth)return;
      body.dataset.krxAuth='1';
      const inputs=body.querySelectorAll('.inp input');
      if(inputs[1])inputs[1].value='';
      const loginBtn=[...body.querySelectorAll('button')].find(b=>b.textContent.trim().startsWith('లాగిన్'));
      if(loginBtn)loginBtn.onclick=async()=>{
        const r=await j('POST','/api/auth/login',{user:inputs[0].value,password:inputs[1].value});
        if(r===null){go('home');return;}
        if(!r.ok){toast('❌ తప్పు ID లేదా పాస్‌వర్డ్');return;}
        setAuth({token:r.token,role:r.user.role,user:r.user});
        toast('✅ Welcome, '+r.user.name);
        go('home');
      };
    }
    /* --- Field staff home: change-password shortcut --- */
    if(S.app==='field'&&S.screen==='home'&&window.KRX_AUTH&&window.KRX_AUTH.role!=='farmer'){
      const ab=document.querySelector('.phone .ab');
      if(ab&&!ab.querySelector('.krx-key')){const b=document.createElement('button');b.className='ib krx-key';b.textContent='🔑';b.title='Change password';b.onclick=window.changePasswordForm;ab.appendChild(b);}
    }
    /* --- Dashboards (agronomist / fpo / admin): real password login --- */
    if(S.screen==='login'&&['agronomist','fpo','admin'].includes(S.app)&&typeof window.__ok==='function'&&!window.__ok.krxWrapped){
      const inputs=document.querySelectorAll('.dash .inp input');
      if(inputs[1])inputs[1].value='';
      const orig=window.__ok;
      const wrapped=async function(){
        const ins=document.querySelectorAll('.dash .inp input');
        const r=await j('POST','/api/auth/login',{user:ins[0]?ins[0].value:'',password:ins[1]?ins[1].value:''});
        if(r===null){orig();return;}
        if(!r.ok){toast('❌ Invalid email or password');return;}
        setAuth({token:r.token,role:r.user.role,user:r.user});
        orig();
      };
      wrapped.krxWrapped=true;
      window.__ok=wrapped;
    }
  }
  const _render4=render;
  render=function(){_render4();try{enhance()}catch(e){}};
  enhance();
})();
</script>

<!-- ===== REAL CART + EMPLOYEE ACCOUNTS LAYER ===== -->
<script>
(function(){
  /* cart entries become {id, qty} of actual products */
  cart=[];

  window.krxAdd=function(id){const ex=cart.find(it=>it.id===id);if(ex)ex.qty++;else cart.push({id:id,qty:1});notify('కార్ట్‌లో జోడించబడింది');};
  window.krxQty=function(i,d){cart[i].qty=Math.max(1,cart[i].qty+d);go('cart');};
  function cartCount(){return cart.reduce((s,it)=>s+it.qty,0);}
  function cartTotal(){let t=0;cart.forEach(it=>{const p=PRODUCTS.find(x=>x.id===it.id);if(p)t+=p.price*it.qty;});return t;}

  /* shop rows add the actual product */
  prodRow=function(p){const idx=PRODUCTS.indexOf(p);return `<div class="prod"><div class="pi" onclick="go('product',PRODUCTS[${idx}])">${p.e}</div><div class="pn" onclick="go('product',PRODUCTS[${idx}])"><b class="te">${p.name}</b> <span style="font-size:11px;color:var(--onv)">(${p.nameEn||''})</span><div class="pr">₹${p.price}</div><span class="sbad ${p.stk?'sb-ok':'sb-no'} te">${p.stk?'నిల్వలో':'నిల్వ లేదు'}</span></div><div style="display:flex;flex-direction:column;gap:6px"><button class="addb te" onclick="event.stopPropagation();window.__krxPid='${p.id}';requireConsent(()=>{krxAdd(window.__krxPid);farmerNav('shop')})">కార్ట్</button><button class="addb te" style="background:var(--info)" onclick="event.stopPropagation();window.__krxPid='${p.id}';requireConsent(()=>{krxAdd(window.__krxPid);go('cart')})">కొనండి</button></div></div>`;};

  /* real cart screen: actual items, quantity controls, correct totals */
  function paintCart(){
    const t=cartTotal(),g=Math.round(t*.05),dc=cart.length?getDeliveryCharge(t):0,tot=t+g+dc;
    const def=addresses.find(a=>a.def)||addresses[0];
    let body;
    if(!cart.length)body=empty('🛒','మీ కార్ట్ ఖాళీగా ఉంది','ఉత్పత్తులు చూడండి',"go('shop',null,true)");
    else{
      const rows=cart.map((it,i)=>{const p=PRODUCTS.find(x=>x.id===it.id)||{name:'',nameEn:'',price:0,e:'🛢️'};return `<div class="prod"><div class="pi">${p.e}</div><div class="pn"><b class="te">${p.name}</b> <span style="font-size:11px;color:var(--onv)">(${p.nameEn||''})</span><div class="pr">₹${p.price} × ${it.qty} = ₹${p.price*it.qty}</div></div><div style="display:flex;gap:2px;align-items:center"><button class="ib" style="width:34px;height:34px" onclick="krxQty(${i},-1)">−</button><b>${it.qty}</b><button class="ib" style="width:34px;height:34px" onclick="krxQty(${i},1)">＋</button><button class="ib" style="width:34px;height:34px" onclick="cart.splice(${i},1);go('cart')">🗑️</button></div></div>`;}).join('');
      body=rows+
      `<div class="card fl"><div style="display:flex;justify-content:space-between;align-items:center"><b class="te" style="font-size:13px">📍 డెలివరీ చిరునామా</b><button class="ib" onclick="go('addaddr')">✏️</button></div><p class="te" style="margin:6px 0 0;font-size:13px;color:var(--onv)">${def?def.label+' — '+def.line+' · '+def.pin:'చిరునామా లేదు'}</p><button class="btn gh te" style="margin-top:2px;padding:6px" onclick="go('addaddr')">＋ కొత్త చిరునామా జోడించండి</button></div>
      <div class="fld"><label class="te">చెల్లింపు విధానం</label><div class="chiprow" id="payMethods">${['💳 క్రెడిట్ కార్డ్','💳 డెబిట్ కార్డ్','📱 UPI','💵 క్యాష్ ఆన్ డెలివరీ'].map((m,i)=>`<div class="chip ${i==2?'on':''} te" onclick="selC(this)">${m}</div>`).join('')}</div></div>
      <div class="card fl"><div style="display:flex;justify-content:space-between" class="te"><span>ఉప మొత్తం (${cartCount()} వస్తువులు)</span><b>₹${t}</b></div><div style="display:flex;justify-content:space-between;margin-top:6px" class="te"><span>GST 5%</span><b>₹${g}</b></div><div style="display:flex;justify-content:space-between;margin-top:6px" class="te"><span>డెలివరీ ఛార్జీ ${dc===0?'(ఉచితం)':''}</span><b>₹${dc}</b></div><hr style="border:0;border-top:1px solid var(--ov);margin:10px 0"><div style="display:flex;justify-content:space-between;font-size:18px" class="te"><b>మొత్తం</b><b style="color:var(--primary)">₹${tot}</b></div></div>
      <button class="btn te" onclick="krxPlaceOrder()">ఆర్డర్ చేయండి</button>`;
    }
    const inner=`<div class="ab"><button class="ib" onclick="go('shop')">←</button><div class="ti te" style="font-size:18px">మీ కార్ట్</div></div><div class="body">${body}</div>`;
    stage().innerHTML=phone(inner,true,'farmerNav',fNav);
  }

  window.krxPlaceOrder=function(){
    if(!cart.length)return;
    const method=document.querySelector('#payMethods .on'),isCOD=method&&method.textContent.includes('క్యాష్');
    const t=cartTotal(),g=Math.round(t*.05),dc=getDeliveryCharge(t),tot=t+g+dc;
    const names=cart.map(it=>{const p=PRODUCTS.find(x=>x.id===it.id)||{name:''};return p.name+' × '+it.qty;}).join(', ');
    const lineItems=cart.map(it=>({productId:it.id,qty:it.qty}));
    const id='#A-'+(2380+myOrders.length+1);
    const newOrd={id:id,product:names,items:names,amt:tot,status:'Booked',eta:'రేపు',payStatus:isCOD?'COD Pending':'Paid',lineItems:lineItems};
    myOrders.unshift(newOrd);
    lineItems.forEach(li=>{const p=PRODUCTS.find(x=>x.id===li.productId);if(p)p.stk=Math.max(0,p.stk-li.qty);});
    ORDERS.unshift({id:id,farmer:farmerProfile?farmerProfile.name:'రాములు రెడ్డి',village:farmerProfile?farmerProfile.village:'Kondapur',items:cartCount()+' వస్తువులు',amt:'₹'+tot,status:'Booked',ftype:farmerProfile&&farmerProfile.fpo==='Individual'?'Individual':'FPO',product:names,payStatus:newOrd.payStatus,lineItems:lineItems,qty:cartCount()});
    if(window.krxJ)window.krxJ('POST','/api/orders',ORDERS[0]);
    cart=[];
    notify('ఆర్డర్ '+id+' బుక్ అయింది');
    go('tracking');
  };

  /* Admin → Add Employee now also creates a real login */
  empLocForm=function(){$('modalRoot').innerHTML=`<div class="modal"><div class="bx"><h3 style="margin:0 0 14px">Add Employee</h3><div class="fg"><div class="f"><label>Name *</label><input id="empName"></div><div class="f"><label>Mobile</label><input id="empMob"></div><div class="f"><label>Email (login ID) *</label><input id="empEmail" placeholder="name@krinexa.app"></div><div class="f"><label>Employee ID</label><input id="empId2" placeholder="EMP-41"></div><div class="f"><label>Role *</label><select id="empRole"><option value="field">Field Officer</option><option value="agronomist">Agronomist</option><option value="fpo">FPO Manager</option><option value="admin">Admin</option></select></div><div class="f"><label>Password (min 8) *</label><input id="empPw" type="password"></div></div><h4 style="margin:14px 0 8px;font-size:14px">Assigned Locations (multiple)</h4><div id="empLocRows">${empLocRow()}</div><button class="db ed" onclick="$('empLocRows').insertAdjacentHTML('beforeend',empLocRow())">＋ Add another location</button><div style="display:flex;gap:10px;margin-top:16px"><button class="db pri" onclick="krxSaveEmployee()">Save & Create Login</button><button class="db no" onclick="closeModal()">Cancel</button></div></div></div>`;};
  window.krxSaveEmployee=async function(){
    const name=$('empName').value.trim(),email=$('empEmail').value.trim(),pw=$('empPw').value,role=$('empRole').value,empId=$('empId2').value.trim();
    if(!name||!email){toast('⚠️ Name and Email are required');return;}
    if(pw.length<8){toast('⚠️ Password must be at least 8 characters');return;}
    let created=true;
    if(window.krxJ){
      const r=await window.krxJ('POST','/api/users',{name:name,email:email,password:pw,role:role,empId:empId});
      if(r&&!r.ok){toast(r.error==='exists'?'❌ An account with this email already exists':r.error==='admin_only'?'❌ Only Admin can create logins':'❌ Could not create login');created=false;}
    }
    if(!created)return;
    EMP.unshift({id:empId||('EMP-'+(EMP.length+41)),name:name,role:role==='field'?'Field Officer':role==='agronomist'?'Agronomist':role==='fpo'?'FPO Manager':'Admin',dept:'Operations',locs:[{dist:districts[0],mandal:MANDALS[districts[0]][0],village:villages[0],pin:'502285'}],fpo:'—',status:'Active'});
    closeModal();notify('Employee saved · login created ('+email+')');go('emp',null,true);
  };

  /* Admin → Product Mgmt → Edit: real edit modal, synced to server */
  window.krxEditProduct=function(pid){
    const p=PRODUCTS.find(x=>x.id===pid);if(!p)return;
    $('modalRoot').innerHTML=`<div class="modal"><div class="bx" style="max-width:440px"><h3 style="margin:0 0 4px">Edit Product</h3><p class="te" style="font-size:13px;color:var(--onv);margin:0 0 14px">${p.name} (${p.nameEn||''}) · ${p.id}</p><div class="fg"><div class="f"><label>Selling Price (₹)</label><input id="epPrice" type="number" value="${p.price}"></div><div class="f"><label>MRP (₹)</label><input id="epMrp" type="number" value="${p.mrp}"></div><div class="f"><label>Stock</label><input id="epStk" type="number" value="${p.stk}"></div><div class="f"><label>Low-stock alert level</label><input id="epLow" type="number" value="${p.lowAlert||20}"></div></div><div style="display:flex;gap:10px;margin-top:16px"><button class="db pri" onclick="krxSaveProductEdit('${p.id}')">Save</button><button class="db no" onclick="closeModal()">Cancel</button></div></div></div>`;
  };
  window.krxSaveProductEdit=function(pid){
    const p=PRODUCTS.find(x=>x.id===pid);if(!p)return;
    p.price=+$('epPrice').value||p.price;p.mrp=+$('epMrp').value||p.mrp;p.stk=Math.max(0,+$('epStk').value||0);p.lowAlert=+$('epLow').value||p.lowAlert;
    p.discount=Math.round((1-p.price/p.mrp)*100);
    if(window.krxJ)window.krxJ('PATCH','/api/products/'+encodeURIComponent(p.id),{price:p.price,mrp:p.mrp,stk:p.stk,lowAlert:p.lowAlert,discount:p.discount});
    closeModal();notify('Product updated · synced to farmer shop');go('prod',null,true);
  };

  /* route the farmer cart screen to the real cart; rebind screens after render */
  const _render6=render;
  render=function(){
    if(S.app==='farmer'&&S.screen==='cart'){paintCart();return;}
    _render6();
    try{
      /* product page: add/buy the actual product */
      if(S.app==='farmer'&&S.screen==='product'){
        const p=S.params||PRODUCTS[0];
        const btns=[...document.querySelectorAll('.phone .body button')];
        const addB=btns.find(b=>b.textContent.includes('కార్ట్‌కు జోడించండి'));
        const buyB=btns.find(b=>b.textContent.includes('ఇప్పుడే కొనండి'));
        if(addB)addB.onclick=function(){window.__krxPid=p.id;requireConsent(()=>{krxAdd(window.__krxPid);render();});};
        if(buyB)buyB.onclick=function(){window.__krxPid=p.id;requireConsent(()=>{krxAdd(window.__krxPid);go('cart');});};
      }
      /* tracking + delivered screens show the farmer's real latest order */
      if(S.app==='farmer'&&S.screen==='tracking'&&myOrders.length){
        const o=myOrders[0];
        const b=document.querySelector('.phone .body .card b.te');
        if(b){b.textContent=o.items;const sub=b.nextElementSibling;if(sub)sub.textContent=o.id+' · ₹'+o.amt;}
      }
      if(S.app==='farmer'&&S.screen==='delivered'&&myOrders.length){
        const o=myOrders[0];
        const pEl=document.querySelector('.phone .body p.te');
        if(pEl)pEl.textContent=o.items+' · '+o.id;
      }
      /* agronomist "Provide Recommendation" closes the loop across devices */
      if(S.app==='agronomist'&&S.screen==='ticket'){
        const i=(S.params&&S.params.i)||0,a=ADV[i];
        const btn=[...document.querySelectorAll('.main button')].find(b=>b.textContent.includes('Provide Recommendation'));
        if(btn&&a)btn.onclick=function(){
          a.remarks=$('remarksInp')?$('remarksInp').value:'';
          a.status='Recommendation Provided';
          S.lastRemarks=a.remarks;
          if(window.krxJ&&a.id)window.krxJ('PATCH','/api/tickets/'+encodeURIComponent(a.id),{status:a.status,remarks:a.remarks});
          toast('✅ Recommendation Provided · Farmer & Field Staff notified');
          go('queue',null,true);
        };
      }
      /* admin product table: working Edit buttons */
      if(S.app==='admin'&&S.screen==='prod'){
        document.querySelectorAll('#apTbl tbody tr').forEach(function(tr,i){
          const btn=tr.querySelector('button.db.ok');
          if(btn&&PRODUCTS[i])btn.onclick=function(ev){ev.stopPropagation();krxEditProduct(PRODUCTS[i].id);};
        });
      }
    }catch(e){}
  };
})();
</script>

<!-- ===== PHOTOS + REPORT EXPORTS LAYER ===== -->
<script>
(function(){
  /* --- Real crop photo uploads (camera/gallery, compressed on-device, max 3) --- */
  window.__krxPhotos=[];
  addAskPhoto=function(el){
    if(window.__krxPhotos.length>=3){toast('⚠️ గరిష్టంగా 3 ఫోటోలు');return;}
    const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
    inp.onchange=function(){
      const f=inp.files&&inp.files[0];if(!f)return;
      const rd=new FileReader();
      rd.onload=function(){
        const img=new Image();
        img.onload=function(){
          const c=document.createElement('canvas'),s=Math.min(1,640/Math.max(img.width,img.height));
          c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
          c.getContext('2d').drawImage(img,0,0,c.width,c.height);
          const data=c.toDataURL('image/jpeg',0.6);
          window.__krxPhotos.push(data);
          el.innerHTML='<img src="'+data+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px">';
          el.onclick=null;
          const row=$('photoRow'),add=document.createElement('div');
          add.className='pt';add.textContent='＋';add.onclick=function(){addAskPhoto(this)};
          row.appendChild(add);
          toast('📷 ఫోటో జోడించబడింది');
        };
        img.src=rd.result;
      };
      rd.readAsDataURL(f);
    };
    inp.click();
  };

  /* --- Working report exports: CSV (opens in Excel) + printable PDF --- */
  window.krxDownloadCSV=function(name,rows){
    const csv='﻿'+rows.map(r=>r.map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
    toast('⬇ '+name+'.csv downloaded (opens in Excel)');
  };
  window.krxPrintTable=function(title,rows){
    const w=window.open('','_blank');if(!w){toast('⚠️ Allow pop-ups to print');return;}
    w.document.write('<html><head><title>'+title+'</title><style>body{font-family:Segoe UI,Noto Sans Telugu,sans-serif;padding:24px}h2{color:#2E7D32}table{border-collapse:collapse;width:100%;font-size:12px}td,th{border:1px solid #999;padding:6px;text-align:left}th{background:#E8F5E9}</style></head><body><h2>Krinexa Agri — '+title+'</h2><table>'+rows.map(function(r,i){return '<tr>'+r.map(function(c){return (i?'<td>':'<th>')+c+(i?'</td>':'</th>');}).join('')+'</tr>';}).join('')+'</table><scr'+'ipt>print()</scr'+'ipt></body></html>');
    w.document.close();
  };
  function csvFarmers(){const rows=[['Farmer ID','Name','Mobile','Village','Mandal','District','FPO/Individual','Crop','Acres','Orders']];FARMERS.forEach(f=>rows.push([f.id,f.name,f.mobile||'',f.village,mandalOf(f.village),f.dist,f.fpo,Array.isArray(f.crop)?f.crop[1]:f.crop,f.acres,f.orders]));return rows;}
  function csvOrders(){const rows=[['Order ID','Farmer','Village','Items','Amount','Status','Payment']];ORDERS.slice(0,300).forEach(o=>rows.push([o.id,o.farmer,o.village,o.items,o.amt,o.status,o.payStatus||'']));return rows;}
  function csvCrops(){const m={};FARMERS.forEach(f=>{const c=Array.isArray(f.crop)?f.crop[1]:f.crop;m[c]=(m[c]||0)+1;});return [['Crop','Farmers']].concat(Object.entries(m));}
  function csvProc(){const rows=[['Request','FPO/FPC','Products','Value','Status']];PROC.forEach(p=>rows.push([p.id,p.fpo,p.prod,p.val,p.status]));return rows;}
  exportFarmers=function(fmt){const rows=csvFarmers();if(fmt==='pdf')krxPrintTable('Farmer Master',rows);else krxDownloadCSV('Krinexa_Farmer_Master',rows);};

  const _r7=render;
  render=function(){
    _r7();
    try{
      /* new advisory request starts with an empty photo set */
      if(S.app==='farmer'&&S.screen==='ask')window.__krxPhotos=[];
      /* agronomist sees the farmer's real photos on the ticket */
      if(S.app==='agronomist'&&S.screen==='ticket'){
        const a=ADV[(S.params&&S.params.i)||0];
        if(a&&a.photos&&a.photos.length){
          const pts=[...document.querySelectorAll('.main .pt')];
          pts.forEach(function(el,k){if(a.photos[k])el.innerHTML='<img src="'+a.photos[k]+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px">';});
        }
      }
      /* FPO reports: PDF/Excel buttons work */
      if(S.app==='fpo'&&S.screen==='reports'&&!S.loading){
        const sets=[['Farmer Performance',csvFarmers],['Crop Analytics',csvCrops],['Procurement',csvProc],['Sales',csvOrders]];
        [...document.querySelectorAll('.main .pan')].forEach(function(pan,i){
          if(!sets[i])return;
          const btns=pan.querySelectorAll('button');
          if(btns[0])btns[0].onclick=function(){krxPrintTable(sets[i][0],sets[i][1]());};
          if(btns[1])btns[1].onclick=function(){krxDownloadCSV('Krinexa_'+sets[i][0].replace(/ /g,'_'),sets[i][1]());};
        });
      }
    }catch(e){}
  };
})();
</script>

<!-- ===== ORDER CANCELLATION + REAL NOTIFICATIONS LAYER ===== -->
<script>
(function(){
  function myName(){return farmerProfile?farmerProfile.name:'రాములు';}

  /* notifications derived from the farmer's real orders, tickets and broadcasts */
  window.krxNotifs=function(){
    const list=[];
    ADV.filter(a=>a.farmer===myName()).forEach(t=>{
      if(t.status==='Recommendation Provided'||t.status==='Closed'||(t.remarks&&t.remarks.length))
        list.push({ic:'✅',bg:'#2E7D32',fg:'#fff',t:'నిపుణుడి సమాధానం వచ్చింది',d:t.crop+(t.plotArea?' · '+t.plotArea:''),tm:'ఇప్పుడే',go:'advdetail'});
    });
    myOrders.forEach(o=>{
      if(o.status==='Dispatched')list.push({ic:'🚚',bg:'#FFF3CD',fg:'#664d03',t:'ఆర్డర్ రవాణా అయింది',d:o.items,tm:o.eta||'',go:'tracking'});
      else if(o.status==='Delivered')list.push({ic:'📦',bg:'#E8F5E9',fg:'#1B5E20',t:'డెలివరీ పూర్తయింది',d:o.items,tm:'',go:'tracking'});
      else if(o.status==='Cancelled')list.push({ic:'❌',bg:'#FFEBEE',fg:'#B71C1C',t:'ఆర్డర్ రద్దు చేయబడింది',d:o.items,tm:'',go:'orderhist'});
      else if(o.status==='Booked')list.push({ic:'🛒',bg:'#E3F2FD',fg:'#0D47A1',t:'ఆర్డర్ బుక్ అయింది',d:o.items,tm:o.eta||'',go:'tracking'});
    });
    BROADCASTS.forEach(b=>list.push({ic:b.img||'🌧️',bg:'#FFF3CD',fg:'#664d03',t:'వాతావరణ హెచ్చరిక',d:(b.msg||'').slice(0,44),tm:b.date||'',go:'broadcast:'+b.id}));
    return list;
  };
  function seenCount(){try{return +localStorage.getItem('krx_notif_seen')||0;}catch(e){return 0;}}
  function unread(){return Math.max(0,krxNotifs().length-seenCount());}
  function markSeen(){try{localStorage.setItem('krx_notif_seen',String(krxNotifs().length));}catch(e){}}
  window.markNotifOpen=function(target){
    markSeen();
    if(target.indexOf('broadcast:')===0)go('broadcastdetail',{id:target.split(':')[1]});
    else go(target,null,['advdetail','tracking'].indexOf(target)>=0);
  };

  /* order cancellation (before dispatch): restores stock, syncs to server */
  window.krxCancelOrder=function(id){
    $('modalRoot').innerHTML=`<div class="modal"><div class="bx" style="max-width:360px"><h3 class="te" style="margin:0 0 8px">ఆర్డర్ రద్దు చేయాలా?</h3><p class="te" style="font-size:13px;color:var(--onv)">${id} — రద్దు చేసిన తర్వాత తిరిగి పొందలేరు.</p><div style="display:flex;gap:10px;margin-top:14px"><button class="btn dl te" style="margin-top:0" onclick="krxConfirmCancel('${id}')">అవును, రద్దు చేయండి</button><button class="btn gh te" onclick="closeModal()">వద్దు</button></div></div></div>`;
  };
  window.krxConfirmCancel=function(id){
    const o=myOrders.find(x=>x.id===id);
    if(o){(o.lineItems||[]).forEach(li=>{const p=PRODUCTS.find(x=>x.id===li.productId);if(p)p.stk+=li.qty;});o.status='Cancelled';}
    const oo=ORDERS.find(x=>x.id===id);if(oo)oo.status='Cancelled';
    if(window.krxJ)window.krxJ('PATCH','/api/orders/'+encodeURIComponent(id),{status:'Cancelled'});
    closeModal();notify('ఆర్డర్ '+id+' రద్దు చేయబడింది · స్టాక్ తిరిగి జమ అయింది');go('orderhist');
  };

  const _rN=render;
  render=function(){
    _rN();
    try{
      /* home bell badge shows real unread count */
      if(S.app==='farmer'&&S.screen==='home'){
        const badge=document.querySelector('.phone .ab .ib .badge');
        if(badge){const u=unread();if(u>0){badge.textContent=u;badge.style.display='';}else badge.style.display='none';}
      }
      /* notifications screen shows the real, event-driven list */
      if(S.app==='farmer'&&S.screen==='notif'){
        const list=krxNotifs(),body=document.querySelector('.phone .body');
        if(body)body.innerHTML=list.length?list.map(i=>`<div class="nt" onclick="markNotifOpen('${i.go}')"><div class="ni2" style="background:${i.bg};color:${i.fg}">${i.ic}</div><div class="nb"><b class="te">${i.t}</b><p class="te">${i.d}</p></div><span class="tm te">${i.tm}</span></div>`).join(''):empty('🔔','కొత్త నోటిఫికేషన్లు లేవు','',null);
        markSeen();
      }
      /* cancel button on the tracking screen while the order can still be cancelled */
      if(S.app==='farmer'&&S.screen==='tracking'&&myOrders.length){
        const o=myOrders[0];
        if(['Booked','Confirmed'].indexOf(o.status)>=0){
          const body=document.querySelector('.phone .body');
          if(body&&!body.querySelector('.krx-cancel')){
            const b=document.createElement('button');b.className='btn dl te krx-cancel';b.style.marginTop='10px';b.textContent='❌ ఆర్డర్ రద్దు చేయండి';
            b.onclick=function(){krxCancelOrder(o.id);};body.appendChild(b);
          }
        }
      }
      /* order-history cards: cancel link for still-cancellable orders */
      if(S.app==='farmer'&&S.screen==='orderhist'){
        const cards=document.querySelectorAll('.phone .body .card.fl');
        cards.forEach((card,i)=>{
          const o=myOrders[i];
          if(o&&['Booked','Confirmed'].indexOf(o.status)>=0&&!card.querySelector('.krx-cancel')){
            const b=document.createElement('button');b.className='btn dl te krx-cancel';b.style.marginTop='8px';b.style.padding='8px';b.textContent='❌ రద్దు చేయండి';
            b.onclick=function(ev){ev.stopPropagation();krxCancelOrder(o.id);};card.appendChild(b);
          }
        });
      }
    }catch(e){}
  };
})();
</script>
